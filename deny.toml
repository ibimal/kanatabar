# cargo-deny configuration — licenses, advisories, bans, sources.
# CI runs `cargo deny check`; see justfile `check`.

[graph]
all-features = true
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",     # public-domain dedication; pulled in by the `notify` crate
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path deps (kanatabar-core) are version-less; external wildcards stay banned.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
