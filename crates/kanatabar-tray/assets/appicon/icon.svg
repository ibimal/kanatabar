  <rect x="234.5" y="208.5" width="555" height="555" rx="147.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"></rect>
  
  <path d="M392 550 L512 402 L632 550" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="74" stroke-linecap="round" stroke-linejoin="round" transform="translate(0 9)"></path>
