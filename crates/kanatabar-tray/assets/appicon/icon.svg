<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="KanataBar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#40404a"></stop>
      <stop offset="0.55" stop-color="#2a2a31"></stop>
      <stop offset="1" stop-color="#1a1a1f"></stop>
    </linearGradient>
    <radialGradient id="bgsheen" cx="512" cy="150" r="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="key" x1="0" y1="200" x2="0" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDBB4E"></stop>
      <stop offset="0.5" stop-color="#F49E22"></stop>
      <stop offset="1" stop-color="#E17E12"></stop>
    </linearGradient>
    <linearGradient id="keysheen" x1="0" y1="200" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="keybase" x1="0" y1="560" x2="0" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0"></stop>
